services:

  front-image:
    build: 
      context: ./front-end
      args:
        - REACT_APP_SERVER=http://localhost:2000
    ports: ["3000:3000"]
    environment:
      - REACT_APP_SERVER=http://localhost:2000
    depends_on:
      - back-image
    networks:
      - app-network




  back-image:
    build: ./Backend
    ports:
      - "2000:2000"
    environment:
      - FRONTENDURL=http://localhost:3000
      - DB_HOST=postgres-image
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_NAME=newdb
      - DB_MAX_CONNECTIONS=20
      - DB_IDLE_TIMEOUT=30000
      - DB_CONNECTION_TIMEOUT=2000
      - DB_SESSION_NAME=session
      - SERVER=http://back-image:2000
      - SECRET=super_secret
    depends_on:
      - postgres-image
    networks:
      - app-network



  postgres-image:
    image: postgres
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_USER: postgres
      POSTGRES_DB: newdb
    ports: 
      - "5432:5432"
    volumes:
      - ./Database/postgres_data:/var/lib/postgresql/
      - ./Database/postgre.sql:/docker-entrypoint-initdb.d/postgre.sql:ro
    networks:
      - app-network





  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    networks:
      - app-network



networks:
  app-network:
    driver: bridge